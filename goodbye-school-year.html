<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Goodbye School, Hello Summer!</title>
    <style>
        /* Reset and Base Layout */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            background-color: #bce3ff; /* Matching soft sky-blue background */
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 15px;
        }

        /* Responsive Wrapper */
        .flyer-wrapper {
            max-width: 500px; /* Limits size on desktop so it looks like a real card */
            width: 100%;
            background: #ffffff;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.15);
            overflow: hidden;
            display: flex;
            flex-direction: column; /* Stacks the image and the contact link vertically */
        }

        /* Makes the image stretch perfectly to mobile widths */
        .flyer-img {
            width: 100%;
            height: auto;
            display: block;
        }

        /* Contact & Info Footer Styling */
        .contact-footer {
            text-align: center;
            padding: 20px 15px;
            background-color: #ffffff;
            color: #1a428a; /* Dark blue matching the flyer text */
            font-size: 1.05rem;
            font-weight: 600;
            border-top: 1px solid #f0f0f0;
            line-height: 1.6;
        }

        /* Styling for both links */
        .contact-footer a {
            color: #ff477e; /* Fun pink/coral color inspired by the flip-flops */
            text-decoration: none;
            border-bottom: 2px solid #ff477e;
            transition: color 0.2s ease, border-color 0.2s ease;
        }

        .contact-footer a:hover {
            color: #1a428a;
            border-bottom-color: #1a428a;
        }

        .map-link {
            display: block;
            margin-top: 6px;
            font-size: 0.95rem;
        }

        /* Screen reader/SEO optimization (Invisible to users) */
        .sr-only {
            position: absolute;
            width: 1px;
            height: 1px;
            padding: 0;
            margin: -1px;
            overflow: hidden;
            clip: rect(0, 0, 0, 0);
            border: 0;
        }
    </style>
</head>
<body>

    <main class="flyer-wrapper">
        <img src="flyer.jpg" alt="Goodbye School, Hello Summer Party Invitation" class="flyer-img">
        
        <div class="contact-footer">
            <div>Any questions? <a href="mailto:your-email@example.com">Contact us!</a></div>
            <a href="https://maps.google.com/?q=1200+Park+St,+Alameda,+CA+94501" target="_blank" rel="noopener noreferrer" class="map-link">
                📍 View Location on Map
            </a>
        </div>
        
        <div class="sr-only">
            <h1>Goodbye School, Hello Summer!</h1>
            <p>Let's celebrate the end of school and start of summer. Swing by Park Station for a bite or drink!</p>
            <h2>Event Details</h2>
            <ul>
                <li>Date: Wednesday, June 3</li>
                <li>Time: 5:00 PM – 7:00 PM</li>
                <li>Location: 1200 Park St.</li>
            </ul>
        </div>
    </main>

</body>
</html>
